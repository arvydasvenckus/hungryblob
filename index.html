<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hungry Bob</title>
    <style>
      @font-face {
        font-family: "CandyBeans";
        src: url("/fonts/CandyBeans.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0d0d1a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      #game canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <!-- Pre-load CandyBeans before Phaser starts so Canvas text renders on the first frame -->
    <script>
      (function () {
        var f = new FontFace("CandyBeans", "url('/fonts/CandyBeans.otf') format('opentype')");
        f.load().then(function (loaded) {
          document.fonts.add(loaded);
        }).catch(function () {
          /* font load failed — fall back to monospace silently */
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
