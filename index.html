<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hungry Bob</title>
    <meta name="description" content="Eat, grow, and squeeze through tight spaces. A physics platformer about a blob who can't stop snacking." />

    <!-- Open Graph / social preview -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Hungry Bob" />
    <meta property="og:description" content="Eat, grow, and squeeze through tight spaces. A physics platformer about a blob who can't stop snacking." />
    <meta property="og:image"       content="https://blob-platformer.vercel.app/images/social-preview.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url"         content="https://blob-platformer.vercel.app" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Hungry Bob" />
    <meta name="twitter:description" content="Eat, grow, and squeeze through tight spaces. A physics platformer about a blob who can't stop snacking." />
    <meta name="twitter:image"       content="https://blob-platformer.vercel.app/images/social-preview.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      @font-face {
        font-family: "CandyBeans";
        src: url("/fonts/CandyBeans.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0d0d1a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      #game canvas {
        display: block;
        max-width: 100vw;
        max-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <!-- Pre-load CandyBeans before Phaser starts so Canvas text renders on the first frame -->
    <script>
      (function () {
        var f = new FontFace("CandyBeans", "url('/fonts/CandyBeans.otf') format('opentype')");
        f.load().then(function (loaded) {
          document.fonts.add(loaded);
        }).catch(function () {
          /* font load failed — fall back to monospace silently */
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
